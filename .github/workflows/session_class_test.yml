name: Climbing Session

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment_redux.yml
          activate-environment: climbing
          python-version: 3.11 #3.9
          auto-activate: false
      - name: Install missing dependencies for mne
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip 
          python -m pip install "setuptools<82"
          python -c "import pkg_resources; print('pkg_resources OK')"
      - name: Climbing Session Data loader test
        shell: bash -l {0}
        run: |
          pytest --maxfail=1 --disable-warnings -q
  
  merge:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/development' && success() # only run if tests pass
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Merge dev > main 
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git fetch origin main
          git fetch origin development
          git checkout main
          git merge --ff-only origin/development
          git push origin main

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}